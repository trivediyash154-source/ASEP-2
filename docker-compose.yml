# ============================================================
# AI VEHICLE EXPIRY ENFORCEMENT SYSTEM — Docker Compose
# ============================================================

x-common-env: &common-env
  env_file:
    - .env

x-restart-policy: &restart-policy
  restart: unless-stopped

networks:
  enforcement-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_cache:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: enforcement-postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: enforcement-redis
    <<: *restart-policy
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: enforcement-backend
    <<: [*common-env, *restart-policy]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - model_cache:/app/ai/models
    ports:
      - "8000:8000"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G

  # ─── Celery Worker (AI Tasks) ───────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: enforcement-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q ai,notifications,reports
    <<: [*common-env, *restart-policy]
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - model_cache:/app/ai/models
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.21
    depends_on:
      - backend
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 6G

  # ─── Celery Beat (Scheduler) ────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: enforcement-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    <<: [*common-env, *restart-policy]
    volumes:
      - ./backend:/app
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.22
    depends_on:
      - celery-worker
      - redis

  # ─── Flower (Celery Monitor) ────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: enforcement-flower
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    <<: [*common-env, *restart-policy]
    ports:
      - "5555:5555"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.23
    depends_on:
      - celery-worker

  # ─── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: enforcement-frontend
    <<: [*common-env, *restart-policy]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.30
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: enforcement-nginx
    <<: *restart-policy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - uploads_data:/var/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      enforcement-network:
        ipv4_address: 172.20.0.40
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
