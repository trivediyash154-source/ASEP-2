            <rect x="552" y="270" width="8" height="14" fill="rgba(255,90,90,0.55)" rx="2"/>
        
    
        <circle cx="305" cy="305" r="22" fill="#0a0c0a" stroke="#0b1410" stroke-width="1.5"/>
        <circle cx="305" cy="305" r="9"  fill="#2a2e2a"/>
        <circle cx="510" cy="305" r="22" fill="#0a0c0a" stroke="#0b1410" stroke-width="1.5"/>
        <circle cx="510" cy="305" r="9"  fill="#2a2e2a"/>
    
  </g>

