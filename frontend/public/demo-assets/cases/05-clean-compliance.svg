<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-05-clean-compliance" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3d3128"/>
      <stop offset="0.65" stop-color="#ed9f7e"/>
      <stop offset="1"   stop-color="#2a1f18"/>
    </linearGradient>
    <linearGradient id="road-05-clean-compliance" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1f18"/>
      <stop offset="1" stop-color="#0c0e0c"/>
    </linearGradient>
    <pattern id="grid-05-clean-compliance" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cba98a" stroke-width="0.4" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Sky / background -->
  <rect width="800" height="450" fill="url(#sky-05-clean-compliance)"/>
  <rect width="800" height="450" fill="#ed9f7e" opacity="0.18"/>
  <rect width="800" height="450" fill="url(#grid-05-clean-compliance)"/>

  <!-- Skyline silhouette -->
  <path d="M 0 280 L 80 280 L 90 245 L 130 245 L 140 220 L 200 220 L 210 250 L 260 250 L 270 235 L 340 235 L 350 215 L 420 215 L 430 240 L 500 240 L 510 220 L 580 220 L 590 250 L 650 250 L 660 230 L 740 230 L 750 260 L 800 260 L 800 280 Z"
        fill="#000" opacity="0.40"/>

