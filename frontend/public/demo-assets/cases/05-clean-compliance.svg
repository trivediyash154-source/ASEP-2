  <line x1="0" y1="345" x2="800" y2="345" stroke="#fcd9b4" stroke-width="2" stroke-dasharray="50,28" opacity="0.55"/>
  <line x1="0" y1="395" x2="800" y2="395" stroke="#fcd9b4" stroke-width="2" stroke-dasharray="50,28" opacity="0.40"/>

