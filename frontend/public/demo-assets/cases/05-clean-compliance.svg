            <path d="M 305 240 L 330 220 L 500 220 L 525 240 Z" fill="rgba(180,200,210,0.18)"/>
            <rect x="265" y="270" width="8" height="14" fill="rgba(255,235,180,0.55)" rx="2"/>
            <rect x="552" y="270" width="8" height="14" fill="rgba(255,90,90,0.55)" rx="2"/>
        
    
        <circle cx="305" cy="305" r="22" fill="#0a0c0a" stroke="#0a0805" stroke-width="1.5"/>
        <circle cx="305" cy="305" r="9"  fill="#2a2e2a"/>
        <circle cx="510" cy="305" r="22" fill="#0a0c0a" stroke="#0a0805" stroke-width="1.5"/>
        <circle cx="510" cy="305" r="9"  fill="#2a2e2a"/>
    
  </g>

  <!-- Plate -->
  <g>
    <rect x="365" y="298" width="100" height="26" rx="3" fill="#f7f1de" stroke="#0a0a0a" stroke-width="1.6"/>
    <rect x="365" y="298" width="100" height="6"  fill="#0c2d6b"/>
    <text x="370" y="303.5" font-family="monospace" font-size="5"   font-weight="900" fill="#fff">IND</text>
    <text x="415" y="319"   text-anchor="middle"
